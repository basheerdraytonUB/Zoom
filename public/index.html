<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Calle Control Room</title>

    <!-- Zoom SDK -->
    <script src="https://source.zoom.us/4.0.7/lib/vendor/react.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/react-dom.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux-thunk.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/zoom-meeting-embedded-4.0.7.min.js"></script>

    <!-- ElevenLabs Widget -->
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async></script>

    <style>
      :root {
        --bg: #0a0a0a;
        --panel: rgba(20, 20, 20, 0.94);
        --yellow: #ffcc00;
        --text: #f8f8f8;
        --muted: #bdbdbd;
        --border: rgba(255, 204, 0, 0.25);
      }

      body {
        margin: 0;
        font-family: Arial;
        background: #000;
        color: var(--text);
      }

      .shell {
        width: min(1200px, 95%);
        margin: 30px auto;
      }

      .panel {
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
      }

      input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        background: #111;
        color: white;
        border: 1px solid #333;
      }

      button {
        width: 100%;
        padding: 12px;
        background: var(--yellow);
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }

      #meetingSDKElement {
        margin-top: 20px;
        height: 600px;
      }
    </style>
  </head>

  <body>
    <div class="shell">

      <div class="panel">
        <h2>⚡ Being Control Room ⚡</h2>

        <input id="meetingNumber" placeholder="Meeting Number" />
        <input id="passWord" placeholder="Passcode" />
        <input id="userName" value="Calle AI" />

        <!-- DROPDOWN -->
        <select id="agentSelect">
          <option value="agent_7401km5x2hhwemta4c2tm4azzap9">Calle</option>
          <option value="agent_7501kd6455vqft3bhq0kmthnt5d0">Boomba</option>
          <option value="agent_1001kgqssnspex3sb25byazaq0ga">Kyrie</option>
          <option value="agent_6301khbsmx5kf7yvye4c8k930mtm">Being 4</option>
          <option value="">Custom Being</option>
        </select>

        <input id="customAgentId" placeholder="Custom agent ID (optional)" />

        <button id="loadAgentBtn">Load Agent</button>
        <button id="joinBtn">Join Meeting</button>

        <!-- AGENT -->
        <div id="agentWidgetHost" style="margin-top:20px;"></div>
      </div>

      <div id="meetingSDKElement"></div>

    </div>

    <script>
      const client = ZoomMtgEmbedded.createClient();

      let currentAgentId = "agent_7401km5x2hhwemta4c2tm4azzap9";

      function getAgent() {
        const custom = document.getElementById("customAgentId").value.trim();
        const dropdown = document.getElementById("agentSelect").value;

        return custom || dropdown || currentAgentId;
      }

      function loadAgent(agentId) {
        const host = document.getElementById("agentWidgetHost");
        host.innerHTML = "";

        const widget = document.createElement("elevenlabs-convai");
        widget.setAttribute("agent-id", agentId);

        host.appendChild(widget);
        currentAgentId = agentId;

        console.log("Loaded agent:", agentId);
      }

      document.getElementById("loadAgentBtn").onclick = () => {
        loadAgent(getAgent());
      };

      // Load default
      loadAgent(currentAgentId);

      async function joinMeeting() {
        const meetingNumber = document.getElementById("meetingNumber").value.trim();
        const passWord = document.getElementById("passWord").value.trim();
        const userName = document.getElementById("userName").value.trim();

        const res = await fetch("/zoom-signature", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            meetingNumber,
            role: 0
          })
        });

        const { signature, sdkKey } = await res.json();

        await client.init({
          zoomAppRoot: document.getElementById("meetingSDKElement"),
          language: "en-US"
        });

        await client.join({
          sdkKey,
          signature,
          meetingNumber,
          password: passWord,
          userName
        });
      }

      document.getElementById("joinBtn").onclick = joinMeeting;
    </script>
  </body>
</html>
