<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Zoom Bot Join</title>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/react.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/react-dom.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux-thunk.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/zoom-meeting-embedded-4.0.7.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      input, button { margin: 6px 0; padding: 8px; width: 320px; }
      #meetingSDKElement { width: 100%; height: 700px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <h2>Join Zoom Meeting as Bot</h2>

    <div>
      <input id="meetingNumber" placeholder="Meeting Number" />
      <br />
      <input id="passWord" placeholder="Passcode" />
      <br />
      <input id="userName" placeholder="Bot Display Name" value="AI Assistant" />
      <br />
      <button id="joinBtn">Join Meeting</button>
    </div>

    <div id="meetingSDKElement"></div>

    <script>
      const client = ZoomMtgEmbedded.createClient();

      async function joinMeeting() {
        const meetingNumber = document.getElementById("meetingNumber").value.trim();
        const passWord = document.getElementById("passWord").value.trim();
        const userName = document.getElementById("userName").value.trim() || "AI Assistant";

        const signatureRes = await fetch("/zoom-signature", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            meetingNumber,
            role: 0
          })
        });

        const { signature, error } = await signatureRes.json();
        if (error) {
          alert(error);
          return;
        }

        client.init({
          zoomAppRoot: document.getElementById("meetingSDKElement"),
          language: "en-US",
          customize: {}
        });

        await client.join({
          signature,
          meetingNumber,
          password: passWord,
          userName,
          sdkKey: "",
        });
      }

      document.getElementById("joinBtn").addEventListener("click", joinMeeting);
    </script>
  </body>
</html>
