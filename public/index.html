<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Calle Control Room</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: rgba(20,20,20,0.94);
      --yellow: #ffcc00;
      --text: #f8f8f8;
      --muted: #bdbdbd;
      --border: rgba(255,204,0,0.25);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    body { margin:0; font-family:Arial,sans-serif; background:#000; color:var(--text); }
    .shell { width:min(800px,95%); margin:30px auto; }
    .panel { padding:20px; border:1px solid var(--border); border-radius:16px; background:var(--panel); margin-bottom:16px; }
    input, select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; background:#111; color:white; border:1px solid #333; box-sizing:border-box; }
    .btn-row { display:flex; gap:10px; margin-bottom:10px; }
    button { flex:1; padding:12px; background:var(--yellow); border:none; border-radius:10px; font-weight:bold; cursor:pointer; color:#000; }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    button.danger { background:var(--red); color:#fff; }
    button.blue { background:var(--blue); color:#fff; }
    #status-bar { display:flex; gap:20px; align-items:center; font-size:13px; padding:10px 0; color:var(--muted); }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; background:#555; }
    .dot.green { background:var(--green); }
    .dot.red { background:var(--red); }
    .dot.yellow { background:var(--yellow); }
    #log { background:#0a0a0a; border:1px solid #222; border-radius:8px; padding:10px; font-family:monospace; font-size:12px; height:200px; overflow-y:auto; color:#aaa; margin-top:10px; }
    #log .agent { color:var(--yellow); }
    #log .info  { color:#6b7280; }
    #log .error { color:var(--red); }
    #log .success { color:var(--green); }
  </style>
</head>
<body>
<div class="shell">
  <div class="panel">
    <h2>⚡ Calle Control Room ⚡</h2>

    <input id="meetingNumber" placeholder="Meeting Number (digits only)" />
    <input id="passWord" placeholder="Passcode" />
    <input id="userName" value="Calle AI" />

    <select id="agentSelect">
      <option value="agent_7401km5x2hhwemta4c2tm4azzap9">Calle</option>
      <option value="agent_7501kd6455vqft3bhq0kmthnt5d0">Boomba</option>
      <option value="agent_1001kgqssnspex3sb25byazaq0ga">Kyrie</option>
      <option value="agent_6301khbsmx5kf7yvye4c8k930mtm">Being 4</option>
      <option value="">Custom Being</option>
    </select>

    <input id="customAgentId" placeholder="Custom agent ID (optional)" />

    <div class="btn-row">
      <button id="sendBotBtn" class="blue">Send Agent to Meeting</button>
      <button id="stopBotBtn" class="danger" disabled>Remove Agent</button>
    </div>

    <div id="status-bar">
      <span><span class="dot" id="wsDot"></span>Server: <span id="wsStatus">connecting...</span></span>
      <span><span class="dot" id="botDot"></span>Agent: <span id="botStatus">idle</span></span>
    </div>

    <div id="log"></div>
  </div>
</div>

<script>
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/browser-events";
  let serverWs = null;
  let wsReconnectDelay = 1000;
  let sessionId = null;

  function connectServerWs() {
    log("info", "Connecting to server...");
    serverWs = new WebSocket(WS_URL);

    serverWs.onopen = () => {
      wsReconnectDelay = 1000;
      serverWs.send(JSON.stringify({ type: "ping" }));
    };

    serverWs.onclose = () => {
      setDot("wsDot", "red");
      setStatus("wsStatus", "disconnected");
      log("info", `Reconnecting in ${wsReconnectDelay/1000}s...`);
      setTimeout(connectServerWs, wsReconnectDelay);
      wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
    };

    serverWs.onerror = () => {};

    serverWs.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleMsg(msg);
      } catch(e) {}
    };
  }

  // Browser-side keepalive
  setInterval(() => {
    if (serverWs && serverWs.readyState === WebSocket.OPEN) {
      serverWs.send(JSON.stringify({ type: "ping" }));
    }
  }, 4000);

  function sendToServer(payload) {
    if (serverWs && serverWs.readyState === WebSocket.OPEN) {
      serverWs.send(JSON.stringify(payload));
    }
  }

  function handleMsg(msg) {
    switch(msg.type) {
      case "session_init":
        sessionId = msg.sessionId;
        setDot("wsDot", "green");
        setStatus("wsStatus", "connected");
        log("info", "Connected to server");
        break;

      case "server_ping":
        sendToServer({ type: "ping" });
        break;

      case "bot_status":
        if (msg.status === "launching") {
          setDot("botDot", "yellow");
          setStatus("botStatus", "launching...");
        } else if (msg.status === "running") {
          setDot("botDot", "green");
          setStatus("botStatus", "live in meeting");
          document.getElementById("stopBotBtn").disabled = false;
          document.getElementById("sendBotBtn").disabled = true;
          log("success", msg.msg);
        } else if (msg.status === "stopped") {
          setDot("botDot", "");
          setStatus("botStatus", "idle");
          document.getElementById("stopBotBtn").disabled = true;
          document.getElementById("sendBotBtn").disabled = false;
          log("info", msg.msg);
        } else if (msg.status === "error") {
          setDot("botDot", "red");
          setStatus("botStatus", "error");
          document.getElementById("sendBotBtn").disabled = false;
          log("error", msg.msg);
        }
        break;

      case "bot_log":
        log("info", msg.msg);
        break;
    }
  }

  function getAgentId() {
    const custom = document.getElementById("customAgentId").value.trim();
    const dropdown = document.getElementById("agentSelect").value;
    return custom || dropdown || "agent_7401km5x2hhwemta4c2tm4azzap9";
  }

  document.getElementById("sendBotBtn").onclick = () => {
    const meetingNumber = document.getElementById("meetingNumber").value.replace(/\s/g, "");
    const password = document.getElementById("passWord").value.trim();
    const userName = document.getElementById("userName").value.trim();
    const agentId = getAgentId();

    if (!meetingNumber) { alert("Enter a meeting number"); return; }

    log("info", `Sending agent to meeting ${meetingNumber}...`);
    document.getElementById("sendBotBtn").disabled = true;

    sendToServer({ type: "launch_bot", meetingNumber, password, userName, agentId });
  };

  document.getElementById("stopBotBtn").onclick = () => {
    sendToServer({ type: "stop_bot" });
    log("info", "Stopping agent...");
  };

  function setDot(id, color) {
    const el = document.getElementById(id);
    el.className = "dot" + (color ? " " + color : "");
  }

  function setStatus(id, text) {
    document.getElementById(id).textContent = text;
  }

  function log(cls, text) {
    const el = document.getElementById("log");
    const line = document.createElement("div");
    line.className = cls;
    line.textContent = "[" + new Date().toLocaleTimeString() + "] " + text;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  connectServerWs();
</script>
</body>
</html>
