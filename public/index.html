<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>⚡ Calle Control Room</title>

    <script src="https://source.zoom.us/4.0.7/lib/vendor/react.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/react-dom.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/lib/vendor/redux-thunk.min.js"></script>
    <script src="https://source.zoom.us/4.0.7/zoom-meeting-embedded-4.0.7.min.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #000000, #1a1a1a);
        color: #FFD700;
        text-align: center;
      }

      h2 {
        margin-top: 30px;
        text-shadow: 0 0 10px #FFD700;
      }

      .container {
        margin-top: 20px;
      }

      input {
        margin: 8px;
        padding: 10px;
        width: 280px;
        border: none;
        border-radius: 6px;
        background: #111;
        color: #FFD700;
        outline: none;
        box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
      }

      button {
        margin-top: 10px;
        padding: 12px 20px;
        background: #FFD700;
        color: black;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 0 10px #FFD700;
        transition: 0.2s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #FFD700;
      }

      #meetingSDKElement {
        width: 100%;
        height: 700px;
        margin-top: 20px;
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 10px #FFD700; }
        50% { box-shadow: 0 0 30px #FFD700; }
        100% { box-shadow: 0 0 10px #FFD700; }
      }

      .agent-avatar {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 4px solid #FFD700;
        object-fit: cover;
        animation: pulseGlow 2s infinite;
        background: black;
      }

      .storm-bg {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: radial-gradient(circle at 20% 20%, rgba(255,215,0,0.1), transparent),
                    radial-gradient(circle at 80% 80%, rgba(255,215,0,0.05), transparent);
        z-index: -1;
      }
    </style>
  </head>

  <body>
    <div class="storm-bg"></div>

    <h2>⚡ Calle Control Room</h2>

    <!-- 🦊 Calle Avatar -->
    <div style="margin-top:20px;">
      <img src="/fox-agent.png" alt="Calle AI" class="agent-avatar" />
    </div>

    <div class="container">
      <input id="meetingNumber" placeholder="Meeting Number" />
      <br />
      <input id="passWord" placeholder="Passcode" />
      <br />
      <input id="userName" placeholder="Bot Name" value="⚡ Calle AI" />
      <br />
      <button id="joinBtn">⚡ Join Meeting</button>
    </div>

    <div id="meetingSDKElement"></div>

    <script>
      const client = ZoomMtgEmbedded.createClient();

      async function joinMeeting() {
        const meetingNumber = document.getElementById("meetingNumber").value.trim();
        const passWord = document.getElementById("passWord").value.trim();
        const userName = document.getElementById("userName").value.trim() || "⚡ Calle AI";

        const signatureRes = await fetch("/zoom-signature", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            meetingNumber,
            role: 0
          })
        });

        const { signature, sdkKey, error } = await signatureRes.json();

        if (error) {
          alert(error);
          return;
        }

        await client.init({
          zoomAppRoot: document.getElementById("meetingSDKElement"),
          language: "en-US"
        });

        await client.join({
          sdkKey,
          signature,
          meetingNumber: String(meetingNumber),
          password: passWord,
          userName
        });
      }

      document.getElementById("joinBtn").addEventListener("click", joinMeeting);
    </script>
  </body>
</html>
